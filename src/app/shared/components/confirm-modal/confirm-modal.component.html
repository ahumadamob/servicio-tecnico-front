@if (visible()) {
  <div class="modal fade show d-block" tabindex="-1" aria-modal="true" role="dialog">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title">{{ title() }}</h5>
          <button type="button" class="btn-close" aria-label="Close" (click)="cancelled.emit()"></button>
        </div>
        <div class="modal-body">
          <p class="mb-0">{{ message() }}</p>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-outline-secondary" (click)="cancelled.emit()">{{ cancelLabel() }}</button>
          <button type="button" class="btn btn-danger" (click)="confirmed.emit()">{{ confirmLabel() }}</button>
        </div>
      </div>
    </div>
  </div>

  <div class="modal-backdrop fade show"></div>
}
