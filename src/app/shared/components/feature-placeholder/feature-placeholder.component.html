<section class="feature-placeholder container-fluid py-4">
  <header class="mb-4">
    <h1 class="h3 mb-1">{{ title }}</h1>
    <p class="text-muted mb-0">{{ summary }}</p>
  </header>

  <article class="card shadow-sm border-0">
    <div class="card-header bg-body-secondary fw-semibold">Siguientes pasos del MVP</div>
    <div class="card-body">
      <ol class="mb-0 ps-3">
        <li class="mb-2" *ngFor="let step of nextSteps">{{ step }}</li>
      </ol>
    </div>
  </article>
</section>
