<section class="p-4 fade-view">
  <app-page-header title="Editar repuesto de catálogo" subtitle="Actualizá los datos principales del repuesto." />

  @if (loading()) {
    <div class="card border-0 shadow-sm"><div class="card-body">Cargando datos...</div></div>
  } @else {
    <app-repuesto-catalogo-form
      [form]="form"
      [tiposRepuesto]="tiposRepuesto()"
      [globalErrors]="globalErrors()"
      [submitting]="saving()"
      submitLabel="Guardar cambios"
      (submitted)="save()"
      (cancelled)="cancel()"
    />
  }
</section>
