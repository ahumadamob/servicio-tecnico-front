<section class="p-4 fade-view">
  <app-page-header
    title="Tipos de repuesto"
    subtitle="Administrá las categorías del catálogo de repuestos."
    actionLabel="Nuevo tipo de repuesto"
    actionLink="/tipos-repuesto/nuevo"
    actionIcon="bi-plus-lg"
  />

  @if (errorMessage()) {
    <div class="alert alert-danger">{{ errorMessage() }}</div>
  }

  @if (loading()) {
    <div class="card border-0 shadow-sm"><div class="card-body">Cargando tipos de repuesto...</div></div>
  } @else if (!items().length) {
    <app-empty-state
      title="No hay tipos de repuesto cargados"
      description="Cuando crees el primer tipo aparecerá en esta grilla."
    />
  } @else {
    <div class="card border-0 shadow-sm">
      <div class="table-responsive">
        <table class="table table-hover align-middle mb-0">
          <thead class="table-light">
            <tr>
              <th><button type="button" class="btn btn-link btn-sort" (click)="ordenarPor('nombre')">Nombre <i class="bi" [ngClass]="sortIconFor('nombre')"></i></button></th>
              <th><button type="button" class="btn btn-link btn-sort" (click)="ordenarPor('estado')">Estado <i class="bi" [ngClass]="sortIconFor('estado')"></i></button></th>
              <th class="text-end">Acciones</th>
            </tr>
          </thead>
          <tbody>
            @for (item of sortedItems(); track item.id) {
              <tr>
                <td>{{ item.nombre }}</td>
                <td>
                  <span class="badge" [ngClass]="item.activo ? 'text-bg-success' : 'text-bg-secondary'">
                    {{ item.activo ? 'Activo' : 'Inactivo' }}
                  </span>
                </td>
                <td class="text-end">
                  <div class="d-inline-flex gap-1">
                    <a class="btn btn-outline-secondary btn-sm rounded-pill btn-icon" [routerLink]="['/tipos-repuesto', item.id]" title="Ver">
                      <i class="bi bi-eye"></i>
                    </a>
                    <a class="btn btn-outline-primary btn-sm rounded-pill btn-icon" [routerLink]="['/tipos-repuesto', item.id, 'editar']" title="Editar">
                      <i class="bi bi-pencil"></i>
                    </a>
                    <button
                      type="button"
                      class="btn btn-outline-danger btn-sm rounded-pill btn-icon"
                      (click)="confirmDeactivate(item)"
                      [disabled]="!item.activo"
                      title="Desactivar"
                    >
                      <i class="bi bi-ban"></i>
                    </button>
                  </div>
                </td>
              </tr>
            }
          </tbody>
        </table>
      </div>
    </div>
  }

  <app-confirm-modal
    [visible]="showDeactivateModal()"
    title="Confirmar desactivación"
    [message]="'Vas a desactivar el tipo de repuesto ' + (selectedItem?.nombre ?? '') + '. Esta acción se puede revertir desde backend.'"
    confirmLabel="Desactivar"
    (cancelled)="cancelDeactivate()"
    (confirmed)="desactivarSeleccionado()"
  />
</section>
